workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Set permission
        script: chmod +x gradlew
      - name: Build Debug APK
        script: ./gradlew assembleDebug --warning-mode all --stacktrace
    artifacts:
      - app/build/outputs/apk/debug/*.apk
